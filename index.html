<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A simple notes application">
  <title>Notes App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1 class="app-title">Notes</h1>
      <button class="btn btn-primary" id="new-note-btn" type="button">+ New Note</button>
    </header>
    
    <main class="app-main">
      <section class="notes-section" aria-labelledby="notes-heading">
        <h2 id="notes-heading" class="visually-hidden">Notes List</h2>
        <ul class="notes-list" id="notes-list" role="list">
          <!-- Notes will be dynamically inserted here -->
        </ul>
        <p class="empty-state" id="empty-state">No notes yet. Create your first note!</p>
      </section>
    </main>
    
    <footer class="app-footer">
      <p>&copy; 2026 Notes App</p>
    </footer>
  </div>
  
  <script type="module" src="js/app.js"></script>
</body>
</html>
